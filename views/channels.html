<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinosearch</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/img/icon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="header">
        <div id="head"><h1>KINOSEARCH</h1></div>
        <div id="options">
            <div id="film"><a href="/movies">Movies</a></div>
            <div id="series"><a href="/series">Series</a></div>
            <div id="cartoon"><a href="/cartoons">Cartoons</a></div>
            <div id="TV"><a href="">TV-channels</a></div>
            <div id="favorites"><a href="/favorites">Favorites</a></div>
        </div>
        <div id="search_of">
            <input type="text" id="search" name="search" placeholder="channels">
            <span id="ic"><i class="fa-solid fa-magnifying-glass"></i></span>
        </div>
        <form id="logout" method="POST" action="/logout">
            <button type="submit" class="zz">
                <span id="icon"><i class="fa-solid fa-user"></i></span>
                <span>Logout</span>
            </button>
        </form>   
    </div>

    <span class="main_header">TV Channels</span>
    <div id="filter">

        <div class="filt">
            <label>Caregory</label>
            <select id="genre_filter">
                <option value=""></option>
                <option value="sport">Sport</option>
                <option value="wild">Wild</option>
                <option value="series">TV series</option>
                <option value="science">Science</option>
                <option value="news">News</option>
                <option value="music">Music</option>
                <option value="kids">Kids</option>
                <option value="cooking">Cooking</option>
                <option value="shopping">Shopping</option>
                <option value="culture">Culture</option>
                <option value="health">Health</option>
            </select>
        </div>

        <div class="filt">
            <label>Country</label>
            <select id="country_filter">
                <option value=""></option>
                <option value="Australia">Australia</option>
                <option value="Argentina">Argentina</option>
                <option value="Armenia">Armenia</option>
                <option value="Belarus">Belarus</option>
                <option value="Belgium">Belgium</option>
                <option value="Brazil">Brazil</option>
                <option value="UK">UK</option>
                <option value="US">US</option>
                <option value="Hungary">Hungary</option>
                <option value="Germany">Germany</option>
                <option value="China">China</option>
                <option value="Denmark">Denmark</option>
                <option value="India">India</option>
                <option value="Ireland">Ireland</option>
                <option value="Italy">Italy</option>
                <option value="Kazakhstan">Kazakhstan</option>
                <option value="Kyrgystan">Kyrgystan</option>
                <option value="Canada">Canada</option>
                <option value="Colombia">Colombia</option>
                <option value="Mexico">Mexico</option>
                <option value="Netherlands">Netherlands</option>
                <option value="New Zealand">New Zealand</option>
                <option value="Poland">Poland</option>
                <option value="Russia">Russia</option>
                <option value="Thailand">Thailand</option>
                <option value="Turkey">Turkey</option>
                <option value="Finland">Finland</option>
                <option value="France">France</option>
                <option value="Switzerland">Switzerland</option>
                <option value="Sweden">Sweden</option>
                <option value="South Africa">South Africa</option>
                <option value="South Korea">South Korea</option>
                <option value="Japan">Japan</option>
            </select>
        </div>

        <div class="filt">
            <label>Status</label>
            <select id="rating_filter">
                <option value=""></option>
                <option value="active">Active</option>
                <option value="no_active">None Active</option>
            </select>
        </div>

    </div>

    <div id="elements">
        <div id="prev" class="pag"><i class="fa-solid fa-angle-left"></i></div>
        <div id="channel_main"></div>
        <div id="next" class="pag"><i class="fa-solid fa-angle-right"></i></div>
    </div>

    <form id="creating">
        <p class="create_head">Create new</p>
        <div class="cont">
            <label>title:
                <input type="text" id="title" class="in" placeholder="title" required>
            </label>
            <label>category:
                <input type="text" id="category" class="in" placeholder="category" required>
            </label>
            <label>country:
                <input type="text" id="country" class="in" placeholder="country" required>
            </label>
        </div>
        <div class="cont">
            <label>launch year: 
                <input type="number" id="launch_year" class="in" placeholder="launch year" required>
            </label>
            <label>owner:
                <input type="text" id="owner" class="in" placeholder="owner" required>
            </label>
            <label>status:
                <input type="string" id="status" class="in" placeholder="status" required>
            </label>
        </div>
        <label>description:<br>
            <textarea id="description" placeholder="description" rows="4" required></textarea>
        </label>
        <label class="contr">image:
            <input type="text" id="image" class="in" placeholder="image">
        </label>
        <label class="contr">official site:
            <input type="text" id="website" class="in" placeholder="website">
        </label>
        <button class="create-btn">create</button>
    </form>

    <div id="footer">

        <div id="soc">
            <div class="soci"><i class="fa-brands fa-vk"></i></div>
            <div class="soci"><i class="fa-brands fa-telegram"></i></div>
            <div class="soci"><i class="fa-brands fa-youtube"></i></div>
            <div class="soci"><i class="fa-brands fa-tiktok"></i></div>
            <div class="soci"><i class="fa-brands fa-instagram"></i></div>
            <div class="soci"><i class="fa-brands fa-x-twitter"></i></div>
        </div>

        <div id="foot2">
            <div class="col"><a href="/movies">All movies</a></div>
            <div class="col"><a href="/series">All series</a></div>
            <div class="col"><a href="/cartoons">All cartoons</a></div>
            <div class="col"><a href="/channels">TV channels</a></div>
        </div>

        <div id="foot1">
            <div class="col"><a href="/about">About us</a></div>
            <div class="col"><a href="/contacts">Contacts</a></div>
        </div>

        <div id="watching">
            <div class="z">
                <div class="z1"><i class="fa-brands fa-apple"></i></div>
                <div class="z2">
                    <div class="z3">download in</div>
                    <div class="z4">App Store</div>
                </div>
            </div>
            <div class="z">
                <div class="z1"><i class="fa-brands fa-google-play"></i></div>
                <div class="z2">
                    <div class="z3">accessible on</div>
                    <div class="z4">Google Play</div>
                </div>
            </div>
            <div class="z">
                <div class="z1"><i class="fa-solid fa-tv"></i></div>
                <div class="z2">
                    <div class="z3">watch on</div>
                    <div class="z4">Smart TV</div>
                </div>
            </div>
            <div class="z">
                <div class="z1"><i class="fa-solid fa-store"></i></div>
                <div class="z2">
                    <div class="z3">install in</div>
                    <div class="z4">RuStore</div>
                </div>
            </div>
        </div>

        <div id="rights">
            <div>©2026, Kinosearch 18+</div>
            <div>Project by <b>Bigali Nugmash</b></div>
        </div>
    </div>

    <script src="/js/channel.js"></script>
</body>
</html>
